<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Comments</title>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ====== GLOBAL ====== */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      background: #fff;
      border-radius: 20px;
      padding: 30px 25px 40px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    h1, h2 {
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 28px;
    }

    h2 {
      font-size: 22px;
      margin-top: 40px;
      border-left: 5px solid #007bff;
      padding-left: 10px;
    }

    p {
      line-height: 1.6;
      color: #555;
    }

    #blog-media img {
      width: 100%;
      border-radius: 14px;
      margin: 20px 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    /* ====== SETUP FORM ====== */
    .setup-input {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 6px rgba(0, 123, 255, 0.2);
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s;
    }

    button:hover {
      background: #0056b3;
      transform: translateY(-1px);
    }

    /* ====== COMMENTS ====== */
    .comments-section {
      margin-top: 40px;
    }

    .comments-list {
      margin-top: 15px;
      display: flex;
      flex-direction: column-reverse;
    }

    .comment {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      padding: 14px 10px;
      border-radius: 12px;
      background: #f8faff;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
    }

    .comment:hover {
      background: #eef5ff;
      transform: translateY(-2px);
    }

    .comment-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #007bff33;
    }

    .comment h4 {
      margin: 0;
      font-size: 16px;
      color: #007bff;
    }

    .comment p {
      margin: 6px 0 4px;
      font-size: 15px;
      color: #333;
    }

    .comment-time {
      font-size: 12px;
      color: #999;
    }

    /* ====== COMMENT INPUT ====== */
    .comment-input {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    textarea {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
      min-height: 70px;
      resize: none;
      transition: 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 6px rgba(0, 123, 255, 0.2);
    }

    /* ====== ANIMATIONS ====== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .comment {
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Enter Blog & User Info</h2>
    <div class="setup-input">
      <input type="number" id="blogIdInput" placeholder="Blog ID" />
      <input type="number" id="userIdInput" placeholder="User ID" />
      <button id="startBtn">Start</button>
    </div>

    <div id="blog-container" style="display:none;">
      <h1 id="blog-title">Loading...</h1>
      <p id="blog-description"></p>
      <div id="blog-media"></div>

      <div class="comments-section">
        <h2>Comments</h2>
        <div id="comments-list" class="comments-list"></div>

        <div class="comment-input">
          <textarea id="commentText" placeholder="Write your comment..."></textarea>
          <button id="sendComment">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const socket = io("https://tenanttrust.appistansoft.com", { transports: ['websocket'] });
    let userId, blogId;

    document.getElementById('startBtn').addEventListener('click', async () => {
      blogId = document.getElementById('blogIdInput').value.trim();
      userId = document.getElementById('userIdInput').value.trim();
      if (!blogId || !userId) return alert("Please enter both Blog ID and User ID.");

      document.querySelector('.setup-input').style.display = 'none';
      document.getElementById('blog-container').style.display = 'block';

      socket.emit('joinBlog', blogId);
      socket.emit('getComments', blogId);

      await loadBlog(blogId);
    });

    async function loadBlog(blogId) {
      const res = await fetch(`/api/blogs/${blogId}`);
      const data = await res.json();
      document.getElementById("blog-title").innerText = data.title || "Untitled Blog";
      document.getElementById("blog-description").innerText = data.description || "";
      if (data.images) {
        document.getElementById("blog-media").innerHTML = `<img src="${data.images}" alt="blog" />`;
      }
    }


    socket.on('commentsData', (comments) => {
      renderComments(comments);
    });

    socket.on('newComment', (comment) => {
      appendComment(comment);
    });

    document.getElementById('sendComment').addEventListener('click', () => {
      const text = document.getElementById('commentText').value.trim();
      if (!text) return alert("Comment cannot be empty!");
      socket.emit('addComment', { blogId, userId, description: text });
      document.getElementById('commentText').value = '';
    });

    function renderComments(comments) {
      const list = document.getElementById('comments-list');
      list.innerHTML = '';
      comments.forEach(c => appendComment(c));
    }

    function appendComment(comment) {
      const list = document.getElementById('comments-list');
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerHTML = `
        <img src="${comment.user?.image || '/uploads/users/default.png'}" class="comment-img" />
        <div>
          <h4>${comment.user?.name || 'Anonymous'}</h4>
          <p>${comment.description}</p>
          <span class="comment-time">${new Date(comment.createdAt).toLocaleString()}</span>
        </div>
      `;
      list.prepend(div);
    }
  </script>
</body>
</html>
